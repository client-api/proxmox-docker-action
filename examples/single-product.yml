# Example: Run an SDK E2E suite against a single Proxmox product.
# The simplest shape — drop into .github/workflows/e2e-pve.yml.

name: SDK E2E (PVE)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: client-api/proxmox-docker-action@v1
        with:
          product: pve
          tag: '9.2'

      - run: pnpm install --frozen-lockfile
      - run: pnpm test:e2e:pve
        env:
          NODE_TLS_REJECT_UNAUTHORIZED: '0'
